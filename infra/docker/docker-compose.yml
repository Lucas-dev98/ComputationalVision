version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inventory_db
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory_dev
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: inventory_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OCR Service (Python)
  ocr-service:
    build:
      context: ../../services/ocr
      dockerfile: Dockerfile
    container_name: ocr_service
    ports:
      - "5001:5001"
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      - postgres
    volumes:
      - ./services/ocr:/app

  # Inventory Service (Go)
  inventory-service:
    build:
      context: ../../services/inventory
      dockerfile: Dockerfile
    container_name: inventory_service
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://inventory:inventory_dev@postgres:5432/inventory_db?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/inventory:/app

  # Web Research Service (Go)
  web-research-service:
    build:
      context: ../../services/web-research
      dockerfile: Dockerfile
    container_name: web_research_service
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"

  # Frontend (React)
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: inventory_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:8080"
      REACT_APP_OCR_URL: "http://localhost:5001"
      REACT_APP_WEB_RESEARCH_URL: "http://localhost:8083"
    depends_on:
      - inventory-service
      - ocr-service
      - web-research-service
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: inventory_network
